[theme]
base = "light"
primaryColor = "#1E6FE8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#1A1A2E"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "viewer"

[logger]
level = "error"
messageFormat = "%(asctime)s - %(levelname)s - %(message)s"

[server]
headless = true
runOnSave = false
maxUploadSize = 200
enableCORS = true
enableXsrfProtection = true

[ui]
hideTopBar = false
hideSidebarNav = false
